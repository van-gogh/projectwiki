<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WhyWiki</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="brand">WhyWiki</div>
    <nav data-workspace-nav>
      <button data-view="status" data-i18n="nav.status">Demand status</button>
      <button data-view="sources" data-i18n="nav.sources">Original files</button>
      <button data-view="facts" data-i18n="nav.facts">Facts and evidence</button>
      <button data-view="review" data-i18n="nav.review">Demand conflicts</button>
      <button data-view="ask" data-i18n="nav.ask">Demand Q&amp;A</button>
      <button data-view="settings" data-i18n="nav.settings">Settings</button>
    </nav>
    <section class="collaboration-panel" aria-label="Collaboration">
      <div class="collaboration-panel__row">
        <span data-i18n="accountStatusLabel">Accounts</span>
        <span id="accountStatus" class="status-pill">Not connected</span>
      </div>
      <div class="collaboration-panel__actions">
        <button id="loginGithubButton" class="secondary-action" type="button" data-i18n="loginGithub" disabled aria-disabled="true">Login with GitHub</button>
        <button id="loginGiteaButton" class="secondary-action" type="button" data-i18n="loginGitea" disabled aria-disabled="true">Login with Gitea</button>
      </div>
      <div class="collaboration-panel__row">
        <span data-i18n="workspaceStatusLabel">Workspace</span>
        <span id="workspaceStatus" class="status-pill">Not configured</span>
      </div>
      <div id="linkedRepoStatus" class="linked-repo-status"></div>
    </section>
  </aside>
  <main class="workspace">
    <header class="topbar">
      <input id="search" placeholder="Search current project" data-i18n-placeholder="search.placeholder" />
      <div class="topbar-tools">
        <span id="current-project-name" class="project-pill"></span>
        <button class="tool-button" data-view="projects" data-i18n="nav.projects">Projects</button>
        <button class="tool-button project-tool" data-view="wiki" data-i18n="nav.wikiIndex">Wiki index</button>
        <div class="language-switch" data-active-lang="en-US" aria-label="Language">
          <button data-lang="zh-CN">中文</button>
          <button data-lang="en-US">EN</button>
        </div>
      </div>
    </header>
    <section class="dashboard">
      <div id="app"></div>
    </section>
  </main>
  <script src="/static/i18n.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
