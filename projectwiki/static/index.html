<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ProjectWiki</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="brand">ProjectWiki</div>
    <nav>
      <button data-view="projects" data-i18n="nav.projects">Projects</button>
      <button data-view="sources" data-i18n="nav.sources">Sources</button>
      <button data-view="facts" data-i18n="nav.facts">Facts</button>
      <button data-view="wiki" data-i18n="nav.wiki">Wiki</button>
      <button data-view="conflicts" data-i18n="nav.conflicts">Conflicts</button>
      <button data-view="handover" data-i18n="nav.handover">Handover</button>
      <button data-view="ask" data-i18n="nav.ask">Ask</button>
      <button data-view="settings" data-i18n="nav.settings">Settings</button>
    </nav>
  </aside>
  <main class="workspace">
    <header class="topbar">
      <input id="search" placeholder="Search project memory" data-i18n-placeholder="search.placeholder" />
      <div class="language-switch">
        <button data-lang="zh-CN">中文</button>
        <button data-lang="en-US">EN</button>
      </div>
    </header>
    <section class="dashboard">
      <div class="panel">
        <h1 data-i18n="dashboard.title">Project Memory</h1>
        <div class="actions">
          <button class="primary" data-i18n="action.useDemo">Use demo project</button>
          <button data-i18n="action.createProject">Create project</button>
          <button data-i18n="action.ingest">Ingest local folder</button>
          <button data-i18n="action.buildWiki">Build wiki</button>
        </div>
      </div>
      <div id="app"></div>
    </section>
  </main>
  <script src="/static/i18n.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
